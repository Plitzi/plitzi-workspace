# Builds every standalone site under websites/ and deploys them to GitHub Pages on each published release.
#
# GitHub Pages serves a single site per repo, so we can't deploy each website on its own. Instead the `build` job
# fans out over websites/* with a matrix (built in parallel, each under its own sub-path), and the `deploy` job
# stitches all the build artifacts into one `_site/` and publishes it once.
#
# Convention for a new site: drop a folder in websites/ that is a standalone Vite app with its own package-lock.json,
# a `build` script, and a base path driven by the VITE_BASE env var. The matrix discovers it automatically — no edit
# to this workflow needed. Each site is served at https://<org>.github.io/plitzi-workspace/<folder>/.
name: deploy-websites

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish rather than cancelling a live publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.find.outputs.sites }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        name: Discover websites
        run: |
          sites=$(find websites -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort | jq -R . | jq -sc .)
          echo "sites=$sites" >> "$GITHUB_OUTPUT"
          echo "Found sites: $sites"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: ${{ fromJSON(needs.discover.outputs.sites) }}
    defaults:
      run:
        working-directory: websites/${{ matrix.site }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: websites/${{ matrix.site }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE: /plitzi-workspace/${{ matrix.site }}/

      - uses: actions/upload-artifact@v4
        with:
          name: site-${{ matrix.site }}
          path: websites/${{ matrix.site }}/dist
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: site-*

      - name: Assemble sites
        run: |
          mkdir -p _site
          links=""
          for dir in _artifacts/site-*/; do
            name=${dir#_artifacts/site-}
            name=${name%/}
            mkdir -p "_site/$name"
            cp -r "$dir." "_site/$name/"
            links="$links    <li><a href=\"./$name/\">$name</a></li>\n"
          done
          printf '<!doctype html><meta charset="utf-8"><title>Plitzi websites</title><h1>Plitzi websites</h1><ul>\n%b</ul>\n' "$links" > _site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
