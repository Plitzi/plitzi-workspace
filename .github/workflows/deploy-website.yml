# Builds the @plitzi/sdk-store marketing/docs site (websites/sdk-store/) and deploys it to GitHub Pages on every
# published release. The site is a standalone Vite app (its own npm lockfile) living outside apps/ and packages/, so
# it stays out of the monorepo's yarn/turbo workspaces and CI.
name: deploy-website

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish rather than cancelling a live publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: websites/sdk-store
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: websites/sdk-store/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: websites/sdk-store/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
